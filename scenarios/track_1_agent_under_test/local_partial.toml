# Partial test-set: 5 tasks per type, 1 trial — quick validation before full run.

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
cmd = "python src/track_1_agent_under_test/server.py --host 127.0.0.1 --port 8080 --agent-llm gemini/gemini-3.5-flash"

[config]
num_trials = 1
task_split = "test"
tasks_base_num_tasks = 5
tasks_hallucination_num_tasks = 5
tasks_disambiguation_num_tasks = 5
max_steps = 50
