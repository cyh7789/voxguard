# 30 tasks (10 per type), 1 trial — broader validation.

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
cmd = "python src/track_1_agent_under_test/server.py --host 127.0.0.1 --port 8080 --agent-llm gemini/gemini-3.5-flash"

[config]
num_trials = 1
task_split = "test"
tasks_base_num_tasks = 10
tasks_hallucination_num_tasks = 10
tasks_disambiguation_num_tasks = 10
max_steps = 50
# Use Mistral for evaluator (user simulator + policy checker) to save Gemini quota
user_model = "mistral/mistral-small-latest"
user_provider = "mistral"
policy_evaluator_model = "mistral/mistral-small-latest"
policy_evaluator_provider = "mistral"
