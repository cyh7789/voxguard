# Only the 12 stable-failure tasks for targeted debugging.

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
cmd = "python src/track_1_agent_under_test/server.py --host 127.0.0.1 --port 8080 --agent-llm openai/gpt-5.4"

[config]
num_trials = 1
task_split = "train"
tasks_base_num_tasks = -1
tasks_hallucination_num_tasks = -1
tasks_disambiguation_num_tasks = -1
tasks_base_task_id_filter = ["base_48", "base_82", "base_88", "base_96"]
tasks_hallucination_task_id_filter = ["hallucination_48", "hallucination_64", "hallucination_78"]
tasks_disambiguation_task_id_filter = ["disambiguation_8", "disambiguation_22", "disambiguation_28", "disambiguation_53", "disambiguation_55"]
max_steps = 50
user_model = "openai/gpt-5.4"
user_provider = "openai"
user_thinking = false
policy_evaluator_model = "openai/gpt-5.4"
policy_evaluator_provider = "openai"
