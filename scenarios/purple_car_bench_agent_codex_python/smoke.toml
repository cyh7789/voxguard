[green_agent]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/green_car_bench_agent/server.py --host 127.0.0.1 --port 8081"

[[participants]]
role = "agent"
endpoint = "http://127.0.0.1:8080"
# The Codex Python-call agent reads CODEX_MODEL from .env. Spark is the default.
cmd = "python src/purple_car_bench_agent_codex_python/server.py --host 127.0.0.1 --port 8080"

[config]
num_trials = 1
task_split = "test"
tasks_base_num_tasks = 3
tasks_hallucination_num_tasks = 0
tasks_disambiguation_num_tasks = 0
